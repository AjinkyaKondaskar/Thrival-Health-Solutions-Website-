name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main, feature/3d-room-experience]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vite build --base=/

      - name: Add CNAME
        run: echo "thrivalhealth.solutions" > dist/CNAME

      - name: Deploy to main branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist
          clean: true
          commit-message: "Deploy built site [skip ci]"
